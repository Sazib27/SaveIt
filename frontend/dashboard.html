<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Dashboard - SaveIt</title>

  <link rel="stylesheet" href="css/style.css"/>

</head>

<body>

<header class="navbar">

  <div class="logo">SaveIt</div>

  <nav>
    <a href="history.html">History</a>
    <a href="premium.html">Premium</a>
    <a href="#" onclick="logout()">Logout</a>
  </nav>

</header>

<section class="dashboard">

  <div class="download-container">

    <h1>Download Videos Instantly</h1>

    <p>
        Download videos from YouTube, Instagram,
        TikTok, Facebook, X and Pinterest.
    </p>

    <div class="search-box">

        <input
            id="mediaUrl"
            type="text"
            placeholder="Paste Video URL..."
        >

        <button class="paste-btn" onclick="pasteClipboard()">
    📋 Paste
</button>

<button class="clear-btn" onclick="clearInput()">
    ✖
</button>

<button class="download-btn" onclick="fetchMedia()">
    ⬇ Download
</button>

    </div>

    <div id="mediaPreview"></div>

</div>
</section>

<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
